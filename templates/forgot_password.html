<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RendezVousDZ</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/auth.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>

    <!-- ══ GLOBAL CONTROLS ══ -->
    <div class="global-controls">
        <div class="lang-picker">
            <button onclick="switchLanguage('en')" data-lang="en" title="English">EN</button>
            <button onclick="switchLanguage('fr')" data-lang="fr" title="Français">FR</button>
            <button onclick="switchLanguage('ar')" data-lang="ar" title="العربية">ع</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
            <span class="theme-icon theme-icon-light">🌙</span>
            <span class="theme-icon theme-icon-dark">☀️</span>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="/static/logo.png" alt="RendezVousDZ Logo" class="auth-logo">
                    <h2 class="auth-title" data-i18n="resetPassword">Reset Password</h2>
                    <p class="auth-subtitle" data-i18n="resetPasswordSub">Enter your email to receive a reset link</p>
                </div>

                {% if success %}
                <div class="auth-success" data-i18n="forgotSuccess">
                    ✅ If an account exists with that email, a reset link has been sent. Please check your inbox.
                </div>
                <div class="auth-footer" style="margin-top:1.5rem;">
                    <p><a href="/login" data-i18n="backToLogin">← Back to Login</a></p>
                </div>
                {% else %}

                {% if error %}
                <div class="auth-error">{{ error }}</div>
                {% endif %}

                <form method="POST" class="auth-form">
                    <div class="form-field">
                        <label for="email" data-i18n="emailAddress">Email Address</label>
                        <input type="email" id="email" name="email"
                               placeholder="you@example.com"
                               required autofocus>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary w-full" data-i18n="sendResetLink">Send Reset Link</button>
                    </div>
                </form>

                <div class="auth-footer" style="margin-top:1.5rem;">
                    <p><a href="/login" data-i18n="backToLogin">← Back to Login</a></p>
                </div>
                {% endif %}
            </div>

            <div style="text-align:center;margin-top:1.5rem;">
                <a href="/" class="btn btn-ghost" data-i18n="backToHome">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>

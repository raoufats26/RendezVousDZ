<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Business Settings - RendezVousDZ">
    <title>Settings - RendezVousDZ</title>
    
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/auth.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="/static/logo.png" alt="RendezVousDZ" class="auth-logo">
                    <h1 class="auth-title">Business Settings</h1>
                    <p class="auth-subtitle">Update your business information</p>
                </div>

                {% if success %}
                <div style="background: rgba(16, 185, 129, 0.1); border: 2px solid var(--success); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: var(--space-lg); text-align: center;">
                    <p style="color: var(--success); font-weight: 600; margin: 0;">
                        ✅ Settings saved successfully!
                    </p>
                </div>
                {% endif %}

                {% if error %}
                <div class="auth-error">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/settings" class="auth-form">
                    <div class="form-field">
                        <label for="name">Business Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="e.g., Elite Barber Shop" 
                            value="{{ business['name'] }}"
                            required
                            autofocus
                        >
                    </div>

                    <div class="form-field">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="">Select a category</option>
                            <option value="barber" {% if business['category'] == 'barber' %}selected{% endif %}>Barber Shop</option>
                            <option value="salon" {% if business['category'] == 'salon' %}selected{% endif %}>Hair Salon</option>
                            <option value="clinic" {% if business['category'] == 'clinic' %}selected{% endif %}>Medical Clinic</option>
                            <option value="dentist" {% if business['category'] == 'dentist' %}selected{% endif %}>Dentist</option>
                            <option value="spa" {% if business['category'] == 'spa' %}selected{% endif %}>Spa & Wellness</option>
                            <option value="restaurant" {% if business['category'] == 'restaurant' %}selected{% endif %}>Restaurant</option>
                            <option value="other" {% if business['category'] == 'other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="city">City</label>
                        <input 
                            type="text" 
                            id="city" 
                            name="city" 
                            placeholder="e.g., Algiers" 
                            value="{{ business['city'] }}"
                            required
                        >
                    </div>

                    <div class="form-field">
                        <label for="max_clients">Max Clients Per Day</label>
                        <input 
                            type="number" 
                            id="max_clients" 
                            name="max_clients" 
                            value="{{ business['max_clients_per_day'] }}" 
                            min="1" 
                            max="100"
                            required
                        >
                        <small style="color: var(--mid-gray); font-size: 0.875rem; margin-top: 0.5rem; display: block;">
                            Note: Changes apply to future bookings only
                        </small>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary w-full">
                            Save Settings
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p>
                        <a href="/dashboard">← Back to Dashboard</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>

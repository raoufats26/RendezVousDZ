<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - RendezVousDZ</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/auth.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">

            <div style="display:flex; justify-content:flex-end; margin-bottom:0.75rem;">
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                    <span class="theme-icon theme-icon-light">☀️</span>
                    <span class="theme-icon theme-icon-dark">🌙</span>
                </button>
            </div>

            <div class="auth-card">
                <div class="auth-header">
                    <img src="/static/logo.png" alt="RendezVousDZ Logo" class="auth-logo">
                    <h2 class="auth-title">New Password</h2>
                    <p class="auth-subtitle">Choose a strong password</p>
                </div>

                {% if success %}
                <div class="auth-success">
                    ✅ Your password has been updated. You can now log in.
                </div>
                <div class="auth-footer" style="margin-top: 1.5rem;">
                    <p><a href="/login">→ Go to Login</a></p>
                </div>

                {% elif error and not token %}
                <div class="auth-error">{{ error }}</div>
                <div class="auth-footer" style="margin-top: 1.5rem;">
                    <p><a href="/forgot-password">Request a new reset link</a></p>
                </div>

                {% else %}

                {% if error %}
                <div class="auth-error">{{ error }}</div>
                {% endif %}

                <form method="POST" class="auth-form">
                    <div class="form-field">
                        <label for="password">New Password</label>
                        <input 
                            type="password" 
                            id="password"
                            name="password" 
                            placeholder="At least 8 characters" 
                            required
                            minlength="8"
                            autofocus
                        >
                    </div>

                    <div class="form-field">
                        <label for="confirm_password">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirm_password"
                            name="confirm_password" 
                            placeholder="Repeat your password" 
                            required
                            minlength="8"
                        >
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary w-full">
                            Update Password
                        </button>
                    </div>
                </form>

                {% endif %}
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/" class="btn btn-ghost">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to RendezVousDZ - Digital Queue Management System">
    <title>Login - RendezVousDZ</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/auth.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>

    <!-- ══ GLOBAL CONTROLS (theme + language) ══ -->
    <div class="global-controls">
        <div class="lang-picker">
            <button onclick="switchLanguage('en')" data-lang="en" title="English">EN</button>
            <button onclick="switchLanguage('fr')" data-lang="fr" title="Français">FR</button>
            <button onclick="switchLanguage('ar')" data-lang="ar" title="العربية">AR</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
            <span class="theme-icon theme-icon-light">☀️</span>
            <span class="theme-icon theme-icon-dark">🌙</span>
        </button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="/static/logo.png" alt="RendezVousDZ Logo" class="auth-logo">
                    <h2 class="auth-title">Welcome Back</h2>
                    <p class="auth-subtitle">Sign in to manage your queue</p>
                </div>

                {% if error %}
                <div class="auth-error">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" class="auth-form" autocomplete="on">
                    <div class="form-field">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email"
                            name="email" 
                            placeholder="you@example.com" 
                            required
                            autocomplete="email"
                            autofocus
                        >
                    </div>

                    <div class="form-field">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password"
                            name="password" 
                            placeholder="Enter your password" 
                            required
                            autocomplete="current-password"
                        >
                        <div class="forgot-password" style="margin-top: 0.5rem;">
                            <a href="/forgot-password">Forgot your password?</a>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary w-full">
                            Sign In
                        </button>
                    </div>
                </form>

                <div class="auth-divider">
                    <span>or</span>
                </div>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="/register">Create one now</a></p>
                </div>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/" class="btn btn-ghost">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
